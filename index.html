 const days=['Mon','Tue','Wed','Thu','Fri']; const times=['9-10','10-11','11-12','12-13','13-14','14-15','15-16','16-17','17-18','18-19','19-20'];

function wireBack(){ const b=screen.querySelector('.back'); if(b) b.onclick=()=>{mode='main'; tab='home'; render();}; }
function renderMain(){ mainNav(); if(tab==='home')renderHome(); if(tab==='settings')renderSettings(); if(tab==='about')renderAbout(); if(tab==='profile')renderProfile(); }
function renderStudent(){ studentNav(); if(studentTab==='general')renderSGeneral(); if(studentTab==='schedule')renderSSchedule(); if(studentTab==='courses')renderSCourses(); if(studentTab==='exams')renderSExams(); if(studentTab==='application')renderSApplications(); }
function render(){ if(mode==='main') renderMain(); else renderStudent(); }
render();
</script>

<script id="pwa-viewport-stability-patch">
(function(){
  function fitPwaViewport(){
    var shell = document.querySelector('.app-shell');
    if(!shell) return;
    var vv = window.visualViewport;
    var vw = (vv && vv.width) || window.innerWidth || document.documentElement.clientWidth || 393;
    var vh = (vv && vv.height) || window.innerHeight || document.documentElement.clientHeight || 852;
    if(!isFinite(vw) || vw < 320) vw = 393;
    if(!isFinite(vh) || vh < 500) vh = 852;
    var scale = vw / 768;
    document.documentElement.style.setProperty('--app-scale', scale);
    shell.style.position = 'fixed';
    shell.style.left = '0';
    shell.style.top = '0';
    shell.style.width = '768px';
    shell.style.height = (vh / scale) + 'px';
    shell.style.transformOrigin = 'top left';
  }
  function scheduleFit(){
    requestAnimationFrame(fitPwaViewport);
    setTimeout(fitPwaViewport, 60);
    setTimeout(fitPwaViewport, 250);
  }
  window.addEventListener('resize', scheduleFit, {passive:true});
  window.addEventListener('orientationchange', scheduleFit, {passive:true});
  window.addEventListener('pageshow', scheduleFit, {passive:true});
  document.addEventListener('visibilitychange', scheduleFit, {passive:true});
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', scheduleFit, {passive:true});
    window.visualViewport.addEventListener('scroll', scheduleFit, {passive:true});
  }
  scheduleFit();
})();
</script>
